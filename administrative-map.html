<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ArcGIS | Yeu cau 1 - Ban do hanh chinh</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.29/"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .layout {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100%;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      background: #f4f6f8;
      border-bottom: 1px solid #d5dbe0;
    }

    .nav a {
      text-decoration: none;
      color: #0a4a7a;
      border: 1px solid #b5c4d1;
      padding: 6px 10px;
      border-radius: 6px;
      background: #ffffff;
      font-size: 14px;
    }

    .nav a:hover {
      background: #eaf3fb;
    }

    #viewDiv {
      height: 100%;
      width: 100%;
    }
  </style>
</head>

<body>
  <div class="layout">
    <nav class="nav">
      <a href="administrative-map.html">Yeu cau 1</a>
      <a href="roads-map.html">Yeu cau 2</a>
      <a href="universities-map.html">Yeu cau 3</a>
    </nav>
    <div id="viewDiv"></div>
  </div>
  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/layers/GeoJSONLayer",
      "esri/geometry/Extent"
    ], function(Map, MapView, GeoJSONLayer, Extent) {

      const map = new Map({
        basemap: "topo-vector"
      });

      const view = new MapView({
        container: "viewDiv",
        map: map,
        extent: new Extent({
          xmin: 102.2,
          ymin: 8.3,
          xmax: 108.2,
          ymax: 12.2,
          spatialReference: { wkid: 4326 }
        })
      });

      const provinceFiles = [
        "AG",
        "CM",
        "CT",
        "DN",
        "DT",
        "TN",
        "TPHCM",
        "VL"
      ];

      const provinceColors = [
        [208, 229, 255, 0.7],
        [176, 215, 255, 0.7],
        [153, 199, 252, 0.7],
        [130, 183, 245, 0.7],
        [105, 167, 235, 0.7],
        [80, 149, 220, 0.7],
        [64, 131, 203, 0.7],
        [48, 112, 184, 0.7]
      ];

      const infoTemplate = {
        title: "{ten_tinh}",
        content: [
          {
            type: "fields",
            fieldInfos: [
              {
                fieldName: "dan_so",
                label: "Dân số",
                format: {
                  digitSeparator: true,
                  places: 0
                }
              },
              {
                fieldName: "dtich_km2",
                label: "Diện tích (km2)",
                format: {
                  digitSeparator: true,
                  places: 2
                }
              }
            ]
          }
        ]
      };

      provinceFiles.forEach(function(fileCode, index) {
        const layer = new GeoJSONLayer({
          url: "./data/VN_Southern_provinces/" + fileCode + ".json",
          title: "Tỉnh/TP " + fileCode,
          popupTemplate: infoTemplate,
          renderer: {
            type: "simple",
            symbol: {
              type: "simple-fill",
              color: provinceColors[index % provinceColors.length],
              outline: {
                color: [20, 59, 96, 1],
                width: 1.25
              }
            }
          },
          labelingInfo: [
            {
              symbol: {
                type: "text",
                color: "#1f2d3d",
                haloColor: "#ffffff",
                haloSize: 1,
                font: {
                  family: "Segoe UI",
                  size: 9,
                  weight: "bold"
                }
              },
              labelPlacement: "always-horizontal",
              labelExpressionInfo: {
                expression: "$feature.ten_tinh"
              }
            }
          ]
        });

        map.add(layer);
      });
    });
  </script>
</body>
</html>
